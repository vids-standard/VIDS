site_name: VIDS — Verified Imaging Dataset Standard
site_url: https://vidsstandard.org
site_description: An open standard for organizing, validating, and delivering annotated medical imaging datasets for AI/ML development.
site_author: Princeton Medical Systems

repo_url: https://github.com/vids-standard/vids-standard
repo_name: vids-standard

copyright: "&copy; 2026 Princeton Medical Systems. Specification: CC BY 4.0 | Tools: Apache 2.0"

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo-nav.svg
  favicon: assets/logo-128.png

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/vids-standard/vids-standard
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/vids-validator/
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/groups/medical-imaging-datasets/

extra_css:
  - assets/extra.css

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Specification:
    - Full Specification: specification/index.md
    - Validation Rules: specification/validation-rules.md
    - Directory Structure: specification/directory-structure.md
    - File Naming: specification/file-naming.md
    - Compliance Profiles: specification/profiles.md
  - Validator:
    - Installation: validator/index.md
    - Quick Start: validator/quickstart.md
    - CLI Reference: validator/cli-reference.md
  - GitHub: https://github.com/vids-standard/vids-standard
