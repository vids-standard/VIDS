<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26215C"/>
      <stop offset="100%" stop-color="#0F6E56"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Shield outline -->
  <path d="M256 100 L355 148 L355 280 Q355 355 256 395 Q157 355 157 280 L157 148 Z" 
        fill="none" stroke="#ffffff" stroke-width="8" opacity="0.92"/>

  <!-- Shield inner glow -->
  <path d="M256 100 L355 148 L355 280 Q355 355 256 395 Q157 355 157 280 L157 148 Z" 
        fill="#ffffff" opacity="0.06"/>

  <!-- Checkmark -->
  <path d="M220 255 L245 280 L300 218" 
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Scan lines left -->
  <line x1="80" y1="210" x2="142" y2="210" stroke="#ffffff" stroke-width="4" opacity="0.35"/>
  <line x1="80" y1="248" x2="134" y2="248" stroke="#ffffff" stroke-width="4" opacity="0.25"/>
  <line x1="80" y1="286" x2="142" y2="286" stroke="#ffffff" stroke-width="4" opacity="0.35"/>

  <!-- Scan lines right -->
  <line x1="370" y1="210" x2="432" y2="210" stroke="#ffffff" stroke-width="4" opacity="0.35"/>
  <line x1="378" y1="248" x2="432" y2="248" stroke="#ffffff" stroke-width="4" opacity="0.25"/>
  <line x1="370" y1="286" x2="432" y2="286" stroke="#ffffff" stroke-width="4" opacity="0.35"/>

  <!-- VIDS text -->
  <text x="256" y="448" text-anchor="middle" 
        fill="#ffffff" font-family="Arial, Helvetica, sans-serif" 
        font-size="48" font-weight="600" letter-spacing="12">VIDS</text>
</svg>
